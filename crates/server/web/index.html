<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThroughWaves — Collaborative Music Platform</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0F0F12;
  --bg-base: #141418;
  --bg-panel: #1C1D22;
  --bg-card: #22232A;
  --bg-elevated: #2A2B33;
  --border: #2E2F38;
  --border-light: #3A3B45;
  --text-primary: #E8E6E1;
  --text-secondary: #9B9A97;
  --text-muted: #65656B;
  --accent: #EBB43C;
  --accent-hover: #F0C35A;
  --accent-dim: rgba(235,180,60,0.15);
  --red: #E5534B;
  --green: #57AB5A;
  --blue: #539BF5;
  --glass-bg: rgba(28,29,34,0.72);
  --glass-border: rgba(255,255,255,0.06);
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.55);
  --transition: 0.2s ease;
}

body.light-theme {
  --bg-deep: #F5F5F7; --bg-base: #FFFFFF; --bg-panel: #F0F0F2;
  --bg-card: #FFFFFF; --bg-elevated: #F8F8FA; --border: #E0E0E4;
  --border-light: #D0D0D5; --text-primary: #1A1A1A; --text-secondary: #555;
  --text-muted: #999; --glass-bg: rgba(255,255,255,0.85);
  --glass-border: rgba(0,0,0,0.06);
}

html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: var(--accent); text-decoration: none; transition: color var(--transition); }
a:hover { color: var(--accent-hover); }

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  font-size: inherit;
}

input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  background: var(--bg-base);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.6rem 0.9rem;
  outline: none;
  transition: border-color var(--transition);
  width: 100%;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 80px; }
select { cursor: pointer; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ===== Layout ===== */
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* ===== Top Nav ===== */
.topnav {
  position: sticky; top: 0; z-index: 100;
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 1.5rem;
}
.topnav-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; height: 60px; gap: 2rem;
}
.logo {
  font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem;
  flex-shrink: 0;
}
.logo-icon {
  width: 30px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #EBB43C 0%, #E8963A 100%);
  position: relative; overflow: hidden;
}
.logo-icon svg { width: 20px; height: 20px; }
.logo-icon::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
  border-radius: 7px;
}
.nav-links { display: flex; gap: 0.25rem; }
.nav-links a {
  padding: 0.45rem 0.85rem; border-radius: var(--radius);
  color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;
  transition: all var(--transition);
}
.nav-links a:hover { color: var(--text-primary); background: var(--bg-elevated); }
.nav-links a.active { color: var(--accent); background: var(--accent-dim); }

.nav-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
.btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.5rem 1.1rem; border-radius: var(--radius);
  font-size: 0.875rem; font-weight: 600; transition: all var(--transition);
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(235,180,60,0.3); }
.btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--border-light); background: var(--bg-card); }
.btn-ghost { color: var(--text-secondary); }
.btn-ghost:hover { color: var(--text-primary); background: var(--bg-elevated); }
.btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: 0.9; }

.avatar {
  width: 32px; height: 32px; border-radius: 50%; background: var(--bg-elevated);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.8rem; color: var(--accent);
  border: 2px solid var(--border); cursor: pointer; flex-shrink: 0;
  transition: border-color var(--transition);
}
.avatar:hover { border-color: var(--accent); }

/* ===== Main Content ===== */
.main {
  flex: 1; max-width: 1200px; width: 100%; margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
}

.page-title {
  font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em;
  margin-bottom: 1.5rem;
}
.page-subtitle {
  color: var(--text-secondary); font-size: 1rem; margin-top: -1rem; margin-bottom: 1.5rem;
}

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.25rem;
}
.section-title { font-size: 1.15rem; font-weight: 600; }

/* ===== Track Card ===== */
.track-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}
.track-card {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 1rem;
  transition: all var(--transition);
  cursor: default;
}
.track-card:hover { border-color: var(--border-light); box-shadow: var(--shadow); transform: translateY(-2px); }
.track-card-top { display: flex; gap: 0.85rem; margin-bottom: 0.75rem; }
.track-cover {
  width: 56px; height: 56px; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
}
.track-cover-art { font-size: 1.4rem; }
.track-info { flex: 1; min-width: 0; }
.track-title {
  font-weight: 600; font-size: 0.95rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-artist { color: var(--text-secondary); font-size: 0.825rem; margin-top: 0.1rem; }
.track-meta {
  display: flex; align-items: center; gap: 0.75rem; margin-top: 0.3rem;
  font-size: 0.75rem; color: var(--text-muted);
}
.track-meta span { display: flex; align-items: center; gap: 0.25rem; }

.waveform-container {
  height: 40px; margin-bottom: 0.6rem; border-radius: 4px; overflow: hidden;
  position: relative; cursor: pointer;
}
.waveform-canvas { width: 100%; height: 100%; display: block; }

.track-card-bottom { display: flex; align-items: center; justify-content: space-between; }
.play-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; transition: all var(--transition);
}
.play-btn:hover { background: var(--accent-hover); transform: scale(1.08); box-shadow: 0 2px 12px rgba(235,180,60,0.35); }
.play-btn.playing { background: var(--text-primary); }

.like-btn {
  display: flex; align-items: center; gap: 0.3rem;
  color: var(--text-muted); font-size: 0.825rem; padding: 0.3rem 0.5rem;
  border-radius: var(--radius); transition: all var(--transition);
}
.like-btn:hover { color: var(--red); background: rgba(229,83,75,0.1); }
.like-btn.liked { color: var(--red); }

.track-duration { color: var(--text-muted); font-size: 0.8rem; font-variant-numeric: tabular-nums; }

/* ===== Explore ===== */
.search-bar {
  position: relative; margin-bottom: 1.25rem;
}
.search-bar input {
  padding-left: 2.5rem; background: var(--bg-panel);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  height: 46px; font-size: 0.95rem;
}
.search-bar .search-icon {
  position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 0.95rem; pointer-events: none;
}

.genre-pills {
  display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem;
}
.genre-pill {
  padding: 0.4rem 0.95rem; border-radius: 20px;
  background: var(--bg-panel); color: var(--text-secondary);
  font-size: 0.825rem; font-weight: 500; border: 1px solid var(--border);
  transition: all var(--transition); cursor: pointer;
}
.genre-pill:hover { border-color: var(--border-light); color: var(--text-primary); }
.genre-pill.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

/* ===== Project Page ===== */
.project-header {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem;
}
.project-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.35rem; }
.project-owner { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.75rem; }
.project-desc { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }

.proposal-list { display: flex; flex-direction: column; gap: 0.75rem; }
.proposal-card {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: 1rem;
  transition: border-color var(--transition);
}
.proposal-card:hover { border-color: var(--border-light); }
.proposal-play {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg-elevated); color: var(--text-primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; flex-shrink: 0;
  transition: all var(--transition);
}
.proposal-play:hover { background: var(--accent); color: #000; }
.proposal-info { flex: 1; min-width: 0; }
.proposal-track-name { font-weight: 600; font-size: 0.9rem; }
.proposal-contributor { color: var(--text-secondary); font-size: 0.8rem; }
.proposal-status {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 0.2rem 0.55rem; border-radius: 4px;
}
.status-proposed { background: rgba(83,155,245,0.15); color: var(--blue); }
.status-accepted { background: rgba(87,171,90,0.15); color: var(--green); }
.status-rejected { background: rgba(229,83,75,0.15); color: var(--red); }

.vote-controls { display: flex; align-items: center; gap: 0.35rem; flex-shrink: 0; }
.vote-btn {
  width: 30px; height: 30px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 0.85rem;
  transition: all var(--transition);
}
.vote-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }
.vote-btn.voted-up { color: var(--green); background: rgba(87,171,90,0.15); }
.vote-btn.voted-down { color: var(--red); background: rgba(229,83,75,0.15); }
.vote-count { font-size: 0.8rem; font-weight: 600; min-width: 1.5rem; text-align: center; font-variant-numeric: tabular-nums; }

/* ===== Upload ===== */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 3rem 2rem;
  text-align: center;
  transition: all var(--transition);
  margin-bottom: 1.5rem;
  cursor: pointer;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent); background: var(--accent-dim);
}
.upload-zone-icon { font-size: 2.5rem; margin-bottom: 0.75rem; color: var(--text-muted); }
.upload-zone-text { color: var(--text-secondary); font-size: 0.95rem; }
.upload-zone-hint { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.35rem; }
.upload-file-name { color: var(--accent); font-weight: 600; margin-top: 0.5rem; }

.form-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
  margin-bottom: 1.5rem;
}
.form-group { display: flex; flex-direction: column; gap: 0.35rem; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 0.825rem; font-weight: 600; color: var(--text-secondary); }

.progress-bar {
  width: 100%; height: 4px; background: var(--bg-elevated);
  border-radius: 2px; overflow: hidden; margin-top: 0.75rem;
  display: none;
}
.progress-bar.active { display: block; }
.progress-bar-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; width: 0%;
  transition: width 0.3s ease;
}

/* ===== Profile ===== */
.profile-header {
  display: flex; align-items: center; gap: 1.5rem;
  margin-bottom: 2rem; padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.profile-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-dim), var(--bg-elevated));
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 700; color: var(--accent);
  border: 3px solid var(--border); flex-shrink: 0;
}
.profile-info h2 { font-size: 1.5rem; font-weight: 700; }
.profile-bio { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem; }

.tab-bar {
  display: flex; gap: 0.25rem; margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border); padding-bottom: 0;
}
.tab-btn {
  padding: 0.6rem 1rem; font-size: 0.875rem; font-weight: 500;
  color: var(--text-muted); border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all var(--transition);
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden; transition: all 0.25s ease;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 2rem;
  width: 90%; max-width: 420px; box-shadow: var(--shadow-lg);
  transform: translateY(20px); transition: transform 0.25s ease;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; }
.modal-subtitle { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1.25rem; }
.modal-tabs { display: flex; gap: 0; margin-bottom: 1.25rem; }
.modal-tab {
  flex: 1; text-align: center; padding: 0.55rem; font-size: 0.875rem;
  font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border);
  transition: all var(--transition);
}
.modal-tab:hover { color: var(--text-secondary); }
.modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.modal-form { display: flex; flex-direction: column; gap: 0.85rem; }
.modal-form .form-label { font-size: 0.8rem; }
.modal-footer { margin-top: 1rem; display: flex; gap: 0.75rem; }
.modal-footer .btn { flex: 1; justify-content: center; padding: 0.6rem; }
.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  color: var(--text-muted); font-size: 1.1rem;
}
.modal .modal-close { position: relative; top: auto; right: auto; margin-left: auto; margin-bottom: -0.5rem; }
.modal-header { display: flex; align-items: start; justify-content: space-between; margin-bottom: 1rem; }
.modal-header-text { flex: 1; }

.error-msg { color: var(--red); font-size: 0.8rem; display: none; }
.error-msg.show { display: block; }

/* ===== Bottom Player ===== */
.bottom-player {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-top: 1px solid var(--glass-border);
  padding: 0.65rem 1.5rem;
  transform: translateY(100%); transition: transform 0.3s ease;
}
.bottom-player.visible { transform: translateY(0); }
.bottom-player-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; gap: 1rem;
}
.bp-track-info { display: flex; align-items: center; gap: 0.75rem; min-width: 0; flex: 0 0 200px; }
.bp-cover {
  width: 40px; height: 40px; border-radius: 6px;
  background: var(--bg-elevated); display: flex; align-items: center;
  justify-content: center; font-size: 1rem; flex-shrink: 0;
}
.bp-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bp-artist { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bp-controls { display: flex; align-items: center; gap: 0.75rem; }
.bp-play {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; transition: all var(--transition);
}
.bp-play:hover { background: var(--accent-hover); }
.bp-progress-wrap { flex: 1; display: flex; align-items: center; gap: 0.75rem; }
.bp-time { font-size: 0.75rem; color: var(--text-muted); font-variant-numeric: tabular-nums; min-width: 38px; }
.bp-progress {
  flex: 1; height: 4px; background: var(--bg-elevated);
  border-radius: 2px; cursor: pointer; position: relative;
}
.bp-progress-bar {
  height: 100%; background: var(--accent); border-radius: 2px;
  width: 0%; transition: width 0.1s linear;
}
.bp-volume { display: flex; align-items: center; gap: 0.4rem; }
.bp-vol-icon { color: var(--text-muted); font-size: 0.85rem; cursor: pointer; }
.bp-vol-slider {
  width: 80px; height: 4px; background: var(--bg-elevated);
  border-radius: 2px; cursor: pointer; position: relative;
}
.bp-vol-bar {
  height: 100%; background: var(--text-muted); border-radius: 2px;
  width: 80%; transition: width 0.1s;
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center; padding: 3rem 1rem;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty-state-text { font-size: 0.95rem; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .topnav-inner { gap: 1rem; }
  .nav-links a { padding: 0.4rem 0.6rem; font-size: 0.8rem; }
  .main { padding: 1.25rem 1rem 6rem; }
  .track-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .profile-header { flex-direction: column; text-align: center; }
  .bp-track-info { flex: 0 0 140px; }
  .bp-volume { display: none; }
  .bottom-player-inner { gap: 0.5rem; }
}
@media (max-width: 480px) {
  .nav-links { gap: 0; }
  .nav-links a { padding: 0.35rem 0.45rem; font-size: 0.75rem; }
  .bp-track-info { flex: 0 0 100px; }
}

/* ===== Track Detail / Waveform Comments ===== */
.track-detail-waveform {
  position: relative; height: 120px; margin-bottom: 0.5rem;
  border-radius: var(--radius); overflow: visible; cursor: crosshair;
}
.track-detail-waveform .waveform-canvas { width: 100%; height: 100%; display: block; }
.waveform-comment-markers {
  position: absolute; top: -8px; left: 0; right: 0; height: 24px; pointer-events: none;
}
.waveform-comment-dot {
  position: absolute; width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--bg-panel);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem; font-weight: 700; color: #000;
  transform: translateX(-50%); cursor: pointer; pointer-events: auto;
  transition: transform 0.15s; z-index: 2;
}
.waveform-comment-dot:hover { transform: translateX(-50%) scale(1.3); z-index: 3; }
.waveform-time-indicator {
  position: absolute; bottom: -22px; left: 0;
  font-size: 0.7rem; color: var(--accent); font-weight: 600;
  pointer-events: none; display: none;
  background: var(--bg-panel); padding: 1px 6px; border-radius: 4px;
}

.comment-input-bar {
  display: flex; gap: 0.75rem; align-items: center;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0.6rem 0.9rem; margin-bottom: 1rem;
}
.comment-input-bar .comment-timestamp {
  font-size: 0.8rem; color: var(--accent); font-weight: 600;
  min-width: 42px; font-variant-numeric: tabular-nums;
}
.comment-input-bar input {
  flex: 1; border: none; background: transparent; padding: 0.3rem 0;
}
.comment-input-bar button {
  padding: 0.35rem 0.85rem; background: var(--accent); color: #000;
  border-radius: var(--radius); font-weight: 600; font-size: 0.8rem;
}

.comment-list { display: flex; flex-direction: column; gap: 0.5rem; }
.comment-item {
  display: flex; gap: 0.75rem; padding: 0.65rem 0;
  border-bottom: 1px solid var(--border);
}
.comment-item:last-child { border-bottom: none; }
.comment-avatar {
  width: 28px; height: 28px; border-radius: 50%; background: var(--bg-elevated);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.65rem; color: var(--accent);
  flex-shrink: 0; border: 1px solid var(--border);
}
.comment-body { flex: 1; min-width: 0; }
.comment-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.15rem; }
.comment-username { font-weight: 600; font-size: 0.825rem; cursor: pointer; }
.comment-username:hover { color: var(--accent); }
.comment-time-link {
  font-size: 0.75rem; color: var(--accent); cursor: pointer;
  font-variant-numeric: tabular-nums; font-weight: 500;
}
.comment-time-link:hover { text-decoration: underline; }
.comment-date { font-size: 0.7rem; color: var(--text-muted); margin-left: auto; }
.comment-text { font-size: 0.875rem; color: var(--text-secondary); }

/* ===== Profile Stats ===== */
.profile-stats {
  display: flex; gap: 1.5rem; margin-top: 0.5rem;
}
.profile-stat {
  font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;
}
.profile-stat:hover { color: var(--text-primary); }
.profile-stat strong { color: var(--text-primary); font-weight: 700; }

.follow-btn {
  padding: 0.45rem 1.2rem; border-radius: 20px; font-weight: 600; font-size: 0.85rem;
  transition: all var(--transition); border: 1px solid var(--accent);
}
.follow-btn.following { background: var(--accent-dim); color: var(--accent); }
.follow-btn.not-following { background: var(--accent); color: #000; }
.follow-btn:hover { opacity: 0.85; }

/* ===== Repost Button ===== */
.repost-btn {
  display: flex; align-items: center; gap: 0.3rem;
  color: var(--text-muted); font-size: 0.825rem; padding: 0.3rem 0.5rem;
  border-radius: var(--radius); transition: all var(--transition);
}
.repost-btn:hover { color: var(--green); background: rgba(87,171,90,0.1); }
.repost-btn.reposted { color: var(--green); }

/* ===== Utilities ===== */
.hidden { display: none !important; }
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mb-2 { margin-bottom: 1rem; }
.mb-3 { margin-bottom: 1.5rem; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-1 { gap: 0.5rem; }

// ===== API Client =====
const API_BASE = '';

async function fetchAPI(path, options = {}) {
  const headers = { ...options.headers };
  if (state.token && state.token !== 'demo_token') {
    headers['Authorization'] = `Bearer ${state.token}`;
  }
  // For FormData, do NOT set Content-Type — the browser sets it with the boundary
  if (options.body && !(options.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
    options.body = JSON.stringify(options.body);
  }
  try {
    const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || err.message || `Request failed (${res.status})`);
    }
    // Handle 204 No Content
    if (res.status === 204) return {};
    return res.json();
  } catch (e) {
    // Network error (server not running) — return null so demo mode can kick in
    if (e instanceof TypeError && e.message === 'Failed to fetch') return null;
    throw e;
  }
}

function switchAuthTab(tab) {
  state.authTab = tab;
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

async function handleAuth(e) {
  e.preventDefault();
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');

  try {
    let result;
    if (state.authTab === 'register') {
      const username = document.getElementById('authUsername').value;
      if (!username) { errEl.textContent = 'Username is required'; errEl.classList.add('show'); return; }
      result = await apiRegister(username, email, password);
    } else {
      result = await apiLogin(email, password);
    }
    if (result && result.token) {
      state.token = result.token;
      state.user = result.user;
      state.isAdmin = !!(result.user && result.user.is_admin);
      localStorage.setItem('jamhub_token', result.token);
    } else if (result === null) {
      // Server unreachable — demo mode: simulate login
      console.log('[ThroughWaves] Server unreachable, entering demo mode');
      state.user = { username: email.split('@')[0], email, bio: 'Music creator on ThroughWaves' };
      state.token = 'demo_token';
      localStorage.setItem('jamhub_token', 'demo_token');
    } else {
      // Server responded but with unexpected format
      errEl.textContent = 'Unexpected server response';
      errEl.classList.add('show');
      return;
    }
    updateAuthUI();
    closeAuthModal();
    renderPage();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
  }
}

// ===== Waveform Drawing =====
function generateWaveformData(count = 60) {
  const data = [];
  for (let i = 0; i < count; i++) {
    const base = 0.3 + Math.random() * 0.7;
    const envelope = Math.sin((i / count) * Math.PI) * 0.4 + 0.6;
    data.push(base * envelope);
  }
  return data;
}

// Estimate integrated LUFS from waveform peak data
function estimateLUFS(track) {
  const data = track.waveform_data;
  if (!data || !Array.isArray(data) || data.length === 0) return '-∞';
  // RMS of waveform peaks → approximate LUFS (simplified EBU R128)
  const nonZero = data.filter(v => v > 0.001);
  if (nonZero.length === 0) return '-∞';
  const rms = Math.sqrt(nonZero.reduce((s, v) => s + v * v, 0) / nonZero.length);
  // Convert to dB, apply K-weighting approximation offset (-0.7 dB typical)
  const db = 20 * Math.log10(rms) - 0.7;
  // LUFS is typically 14-23 dB below full scale for mastered audio
  const lufs = Math.round(db * 10) / 10;
  return lufs > -100 ? lufs.toFixed(1) : '-∞';
}

function drawWaveform(canvas, data, progress = 0) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  if (w === 0 || h === 0) return;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const midY = h / 2;
  const barCount = data.length;

  if (barCount > 100) {
    // SoundCloud-style: filled waveform path for dense data
    // Top half
    ctx.beginPath();
    ctx.moveTo(0, midY);
    for (let i = 0; i < barCount; i++) {
      const x = (i / barCount) * w;
      const amp = data[i] * (h * 0.42);
      ctx.lineTo(x, midY - amp);
    }
    ctx.lineTo(w, midY);
    ctx.closePath();
    // Draw played portion
    const playX = progress * w;
    ctx.save();
    ctx.clip();
    ctx.fillStyle = '#EBB43C';
    ctx.fillRect(0, 0, playX, h);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(playX, 0, w - playX, h);
    ctx.restore();

    // Bottom half (mirrored, dimmer)
    ctx.beginPath();
    ctx.moveTo(0, midY);
    for (let i = 0; i < barCount; i++) {
      const x = (i / barCount) * w;
      const amp = data[i] * (h * 0.35);
      ctx.lineTo(x, midY + amp);
    }
    ctx.lineTo(w, midY);
    ctx.closePath();
    ctx.save();
    ctx.clip();
    ctx.fillStyle = 'rgba(235,180,60,0.4)';
    ctx.fillRect(0, 0, playX, h);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(playX, 0, w - playX, h);
    ctx.restore();

    // Center line
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, midY);
    ctx.lineTo(w, midY);
    ctx.stroke();
  } else {
    // Bar style for sparse data
    const gap = Math.max(1, Math.floor(w / barCount * 0.15));
    const barWidth = Math.max(1, (w - (barCount - 1) * gap) / barCount);

    for (let i = 0; i < barCount; i++) {
      const x = i * (barWidth + gap);
      const barH = Math.max(1, data[i] * (h * 0.8));
      const y = midY - barH / 2;
      const pct = x / w;

      if (pct <= progress) {
        ctx.fillStyle = '#EBB43C';
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
      }
      ctx.beginPath();
      ctx.roundRect(x, y, barWidth, barH, 1);
      ctx.fill();
    }
  }
}

const waveformCache = {};
function getWaveformData(trackId, serverData) {
  if (serverData && Array.isArray(serverData) && serverData.length > 0) {
    waveformCache[trackId] = serverData;
  }
  if (!waveformCache[trackId]) waveformCache[trackId] = generateWaveformData();
  return waveformCache[trackId];
}

// ===== Audio Player =====
const audioEl = document.getElementById('audioEl');

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function playTrack(track) {
  state.currentTrack = track;
  state.isPlaying = true;

  // Show bottom player
  document.getElementById('bottomPlayer').classList.add('visible');
  document.getElementById('bpTitle').textContent = track.title;
  document.getElementById('bpArtist').textContent = track.artist || track.contributor || 'Unknown';
  document.getElementById('bpCover').innerHTML = COVER_ICONS[track.id % COVER_ICONS.length];
  document.getElementById('bpPlayBtn').innerHTML = '&#9646;&#9646;';
  document.getElementById('bpTimeDur').textContent = formatTime(track.duration);

  // Start playback — real audio or simulated
  if (track.audioUrl) {
    audioEl.src = track.audioUrl;
    audioEl.play().catch(() => {});
  }
  // Always start the progress/waveform update interval
  simulatePlayback(track);

  // Update play buttons in the page
  updatePlayButtons();
}

let simInterval = null;
let simTime = 0;

function simulatePlayback(track) {
  if (simInterval) clearInterval(simInterval);
  simTime = 0;
  const dur = track.duration || 200;

  simInterval = setInterval(() => {
    if (!state.isPlaying) return;

    // Use real audio time when available, otherwise simulate
    const hasRealAudio = audioEl.src && !audioEl.paused && audioEl.duration > 0 && !isNaN(audioEl.duration);
    const realDur = hasRealAudio ? audioEl.duration : dur;

    if (hasRealAudio) {
      simTime = audioEl.currentTime;
    } else {
      simTime += 0.1;
    }

    if (simTime >= realDur) {
      simTime = 0;
      state.isPlaying = false;
      document.getElementById('bpPlayBtn').innerHTML = '&#9654;';
      clearInterval(simInterval);
      simInterval = null;
      updatePlayButtons();
      // Reset all waveform canvases for this track
      document.querySelectorAll(`.waveform-canvas[data-track-id="${track.id}"]`).forEach(c => {
        drawWaveform(c, getWaveformData(track.id), 0);
      });
      return;
    }
    const pct = simTime / realDur;
    document.getElementById('bpProgressBar').style.width = (pct * 100) + '%';
    document.getElementById('bpTimeCur').textContent = formatTime(simTime);

    // Update ALL waveform canvases for this track (could be multiple on page)
    document.querySelectorAll(`.waveform-canvas[data-track-id="${track.id}"]`).forEach(canvas => {
      drawWaveform(canvas, getWaveformData(track.id), pct);
    });
  }, 100);
}

function playerToggle() {
  if (!state.currentTrack) return;
  state.isPlaying = !state.isPlaying;
  document.getElementById('bpPlayBtn').innerHTML = state.isPlaying ? '&#9646;&#9646;' : '&#9654;';

  if (state.currentTrack.audioUrl) {
    if (state.isPlaying) audioEl.play().catch(() => {});
    else audioEl.pause();
  } else if (state.isPlaying && !simInterval) {
    simulatePlayback(state.currentTrack);
  }
  updatePlayButtons();
}

function playerSeek(e) {
  if (!state.currentTrack) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const dur = state.currentTrack.duration || 200;
  simTime = pct * dur;
  document.getElementById('bpProgressBar').style.width = (pct * 100) + '%';
  document.getElementById('bpTimeCur').textContent = formatTime(simTime);
  if (state.currentTrack.audioUrl) audioEl.currentTime = pct * audioEl.duration;
}

function playerToggleMute() {
  audioEl.muted = !audioEl.muted;
}

function playerSetVolume(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audioEl.volume = pct;
  document.getElementById('bpVolBar').style.width = (pct * 100) + '%';
}

// Real audio element events
audioEl.addEventListener('timeupdate', () => {
  if (!state.currentTrack || !state.currentTrack.audioUrl) return;
  const pct = audioEl.currentTime / audioEl.duration;
  document.getElementById('bpProgressBar').style.width = (pct * 100) + '%';
  document.getElementById('bpTimeCur').textContent = formatTime(audioEl.currentTime);
  document.getElementById('bpTimeDur').textContent = formatTime(audioEl.duration);
});

function updatePlayButtons() {
  document.querySelectorAll('.play-btn').forEach(btn => {
    const tid = btn.dataset.trackId;
    if (state.currentTrack && (tid == state.currentTrack.id) && state.isPlaying) {
      btn.innerHTML = '&#9646;&#9646;';
      btn.classList.add('playing');
    } else {
      btn.innerHTML = '&#9654;';
      btn.classList.remove('playing');
    }
  });
}

async function toggleLike(trackId) {
  if (!state.user) { openAuthModal(); return; }
  // Try API first
  const result = await apiLikeTrack(trackId);
  if (result) {
    const btn = document.querySelector(`.like-btn[data-track-id="${trackId}"]`);
    if (btn) {
      btn.classList.toggle('liked', result.liked);
      // Update the track in our cache
      const track = findTrackById(trackId);
      if (track) {
        track.liked = result.liked;
        track.likes = (track.likes || 0) + (result.liked ? 1 : -1);
        btn.querySelector('.like-count').textContent = track.likes;
      }
      btn.querySelector('.like-heart').textContent = result.liked ? '\u2665' : '\u2661';
    }
    return;
  }
  // Demo fallback
  const track = demoTracks.find(t => t.id === trackId);
  if (!track) return;
  track.liked = !track.liked;
  track.likes += track.liked ? 1 : -1;
  const btn = document.querySelector(`.like-btn[data-track-id="${trackId}"]`);
  if (btn) {
    btn.classList.toggle('liked', track.liked);
    btn.querySelector('.like-count').textContent = track.likes;
    btn.querySelector('.like-heart').textContent = track.liked ? '\u2665' : '\u2661';
  }
}

// ===== Track lookup helper =====
function findTrackById(trackId) {
  // Search demo tracks and API-loaded tracks
  let t = demoTracks.find(t => t.id === trackId || t.id == trackId);
  if (!t && state._loadedTracks) t = state._loadedTracks.find(t => t.id === trackId || t.id == trackId);
  return t;
}
// Cache for API-loaded tracks
if (!state._loadedTracks) state._loadedTracks = [];

// ===== Voting =====
function voteTrack(projectId, trackId, direction) {
  const project = demoProjects.find(p => p.id === projectId);
  if (!project) return;
  const track = project.tracks.find(t => t.id === trackId);
  if (!track) return;
  track.votes += direction;
  // Also call API (fire and forget)
  apiVoteOnTrack(projectId, trackId, direction);
  // Re-render vote count
  const countEl = document.querySelector(`.vote-count[data-track-id="${trackId}"]`);
  if (countEl) countEl.textContent = track.votes;
}

function onPlayClick(trackId) {
  const track = findTrackById(trackId) || demoTracks.find(t => t.id === trackId);
  if (!track) return;
  if (state.currentTrack && (state.currentTrack.id === trackId || state.currentTrack.id == trackId)) {
    playerToggle();
  } else {
    // Normalize track for player
    const playable = {
      ...track,
      audioUrl: track.audioUrl || track.audio_url || null,
      duration: track.duration || track.duration_seconds || 200,
      artist: track.artist || track._username || 'Unknown',
    };
    playTrack(playable);
    // Fire play count
    if (typeof trackId === 'string') apiPlayTrack(trackId);
  }
}

function handleWaveformClick(e, trackId) {
  const track = findTrackById(trackId) || demoTracks.find(t => t.id === trackId);
  if (!track) return;

  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const dur = (track.duration || track.duration_seconds || 200);

  if (!state.currentTrack || (state.currentTrack.id !== trackId && state.currentTrack.id != trackId)) {
    // Load and play this track from the clicked position
    const playable = {
      ...track,
      audioUrl: track.audioUrl || track.audio_url || null,
      duration: dur,
      artist: track.artist || track._username || 'Unknown',
    };
    playTrack(playable);
    if (typeof trackId === 'string') apiPlayTrack(trackId);
    // Seek after a short delay to let the audio load
    setTimeout(() => {
      if (audioEl.duration && !isNaN(audioEl.duration)) {
        audioEl.currentTime = pct * audioEl.duration;
      }
      simTime = pct * dur;
    }, 100);
  } else {
    // Already playing this track — just seek
    if (audioEl.duration && !isNaN(audioEl.duration)) {
      audioEl.currentTime = pct * audioEl.duration;
    }
  }

  simTime = pct * dur;
  document.getElementById('bpProgressBar').style.width = (pct * 100) + '%';
  document.getElementById('bpTimeCur').textContent = formatTime(simTime);

  // Auto-play if paused
  if (audioEl.paused && audioEl.src) {
    audioEl.play().catch(() => {});
    state.isPlaying = true;
    updatePlayButtons();
  }
}

// ===== Styled Modal System =====

function showModal({ icon, title, message, confirmText, cancelText, onConfirm, dangerous }) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
  const confirmBg = dangerous ? 'var(--red)' : 'var(--accent)';
  const confirmColor = dangerous ? 'white' : '#000';
  overlay.innerHTML = `
    <div style="background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;max-width:420px;width:90%;box-shadow:var(--shadow-lg);text-align:center;">
      ${icon ? '<div style="font-size:2.5rem;margin-bottom:0.8rem;">' + icon + '</div>' : ''}
      <h3 style="margin-bottom:0.5rem;color:var(--text-primary);">${title}</h3>
      <p style="color:var(--text-secondary);margin-bottom:1.5rem;font-size:0.9rem;line-height:1.5;">${message}</p>
      <div style="display:flex;gap:0.8rem;justify-content:center;">
        ${cancelText !== false ? '<button class="tw-modal-cancel" style="padding:0.6rem 1.5rem;border-radius:8px;background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border);cursor:pointer;font-size:0.95rem;">' + (cancelText || 'Cancel') + '</button>' : ''}
        <button class="tw-modal-confirm" style="padding:0.6rem 1.5rem;border-radius:8px;background:${confirmBg};color:${confirmColor};border:none;cursor:pointer;font-size:0.95rem;font-weight:600;">${confirmText || 'OK'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  const cancelBtn = overlay.querySelector('.tw-modal-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', () => overlay.remove());
  overlay.querySelector('.tw-modal-confirm').addEventListener('click', async () => {
    const btn = overlay.querySelector('.tw-modal-confirm');
    if (onConfirm) {
      btn.textContent = 'Working...';
      btn.disabled = true;
      try { await onConfirm(); } catch(e) { showToast('Error: ' + e.message, true); }
    }
    overlay.remove();
  });
  return overlay;
}

function showToast(message, isError) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:10000;padding:0.7rem 1.5rem;border-radius:8px;font-size:0.9rem;box-shadow:var(--shadow);transition:opacity 0.3s;' +
    (isError ? 'background:var(--red);color:white;' : 'background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--accent);');
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderPage() {
  const route = state.currentRoute;
  const main = document.getElementById('mainContent');

  if (route === 'home') renderHome(main);
  else if (route === 'explore') renderExplore(main);
  else if (route === 'projects') renderProjects(main);
  else if (route.startsWith('project/')) renderProject(main, route.split('/')[1]);
  else if (route.startsWith('track/')) renderTrackDetail(main, route.split('/')[1]);
  else if (route.startsWith('user/')) renderUserProfile(main, route.split('/')[1]);
  else if (route === 'upload') renderUpload(main);
  else if (route === 'cloud') renderCloudProjects(main);
  else if (route.startsWith('cloud/')) renderCloudProject(main, route.split('/')[1]);
  else if (route === 'download') renderDownload(main);
  else if (route === 'profile') renderProfile(main);
  else if (route === 'feed') renderFeed(main);
  else if (route === 'admin') renderAdmin(main);
  else renderHome(main);

  // Draw waveforms after DOM update
  requestAnimationFrame(initWaveforms);
}

function initWaveforms() {
  document.querySelectorAll('.waveform-canvas').forEach(canvas => {
    const tid = canvas.dataset.trackId;
    const data = getWaveformData(tid);
    let progress = 0;
    if (state.currentTrack && (state.currentTrack.id == tid) && state.isPlaying) {
      progress = simTime / (state.currentTrack.duration || 200);
    }
    drawWaveform(canvas, data, progress);
  });
}

// Handle resize
window.addEventListener('resize', () => requestAnimationFrame(initWaveforms));

// Waveform hover time indicator for track detail
document.addEventListener('mousemove', (e) => {
  const wf = document.getElementById('trackDetailWaveform');
  const indicator = document.getElementById('waveformTimeIndicator');
  if (!wf || !indicator) return;
  const rect = wf.getBoundingClientRect();
  if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
    const pct = (e.clientX - rect.left) / rect.width;
    // Get duration from the canvas
    const canvas = wf.querySelector('.waveform-canvas');
    const trackId = canvas ? canvas.dataset.trackId : null;
    const track = trackId ? findTrackById(trackId) : null;
    const dur = track ? (track.duration || track.duration_seconds || 0) : 0;
    const time = pct * dur;
    indicator.style.display = 'block';
    indicator.style.left = (e.clientX - rect.left) + 'px';
    indicator.textContent = formatTime(time);
    // Update comment timestamp
    detailCommentTime = time;
    const ts = document.getElementById('commentTimestamp');
    if (ts) ts.textContent = formatTime(time);
  } else {
    indicator.style.display = 'none';
  }
});

function normalizeApiTrack(t) {
  return {
    ...t,
    artist: t._username || t.artist || 'Unknown',
    duration: t.duration_seconds || t.duration || 0,
    likes: t.likes || 0,
    liked: false,
  };
}

// --- Explore ---
async function renderExplore(el) {
  const genre = state.exploreGenre;
  const search = state.exploreSearch.toLowerCase();

  // Try API
  const apiResult = await apiGetTracks(1, genre !== 'All' ? genre : '');
  let tracks;
  if (apiResult && apiResult.data && apiResult.data.length > 0) {
    tracks = apiResult.data.map(normalizeApiTrack);
    state._loadedTracks = [...state._loadedTracks.filter(t => !tracks.find(nt => nt.id === t.id)), ...tracks];
  } else {
    tracks = demoTracks;
  }

  let filtered = tracks;
  if (genre && genre !== 'All' && !apiResult) filtered = filtered.filter(t => t.genre === genre);
  if (search) filtered = filtered.filter(t =>
    t.title.toLowerCase().includes(search) || (t.artist || '').toLowerCase().includes(search)
  );

  el.innerHTML = `
    <h1 class="page-title">Explore</h1>
    <div class="search-bar">
      <span class="search-icon">&#128269;</span>
      <input type="text" placeholder="Search tracks, artists..." id="exploreSearch" value="${esc(state.exploreSearch)}" oninput="onExploreSearch(this.value)">
    </div>
    <div class="genre-pills">
      ${GENRES.map(g => `<button class="genre-pill ${g === genre ? 'active' : ''}" onclick="onGenreFilter('${g}')">${g}</button>`).join('')}

    ${filtered.length ? `<div class="track-grid">${filtered.map(trackCardHTML).join('')}</div>` :
      `<div class="empty-state"><div class="empty-state-icon">&#128269;</div><div class="empty-state-text">No tracks found</div></div>`

  updatePlayButtons();
  requestAnimationFrame(initWaveforms);
}

async function updateCloudProject(projectId) {
  if (!state.token || state.token === 'demo_token') { openAuthModal(); return; }
  const title = document.getElementById('cpEditTitle')?.value || '';
  const genre = document.getElementById('cpEditGenre')?.value || '';
  const desc = document.getElementById('cpEditDesc')?.value || '';
  try {
    const resp = await fetch('/api/cloud/' + projectId, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + state.token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, genre, description: desc }),
    });
    if (resp.ok) {
      showToast('Project updated!');
      renderPage();
    } else {
      const err = await resp.json().catch(() => ({}));
      showToast('Update failed: ' + (err.error || resp.status), true);
    }
  } catch(e) { showToast('Update failed: ' + e.message, true); }
}

function deleteCloudProject(projectId, title) {
  if (!state.token || state.token === 'demo_token') { openAuthModal(); return; }
  // Show styled confirmation modal
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
  overlay.innerHTML = `
    <div style="
      background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:2rem; max-width:420px; width:90%; box-shadow:var(--shadow-lg);
      text-align:center;
    ">
      <div style="font-size:2.5rem; margin-bottom:0.8rem;">&#9888;</div>
      <h3 style="margin-bottom:0.5rem; color:var(--text-primary);">Delete Project?</h3>
      <p style="color:var(--text-secondary); margin-bottom:0.3rem; font-size:0.95rem;">
        <strong>"${title}"</strong>
      </p>
      <p style="color:var(--text-muted); margin-bottom:1.5rem; font-size:0.85rem;">
        All versions, stems, and the mixdown will be permanently deleted.<br>This cannot be undone.
      </p>
      <div style="display:flex; gap:0.8rem; justify-content:center;">
        <button onclick="this.closest('div[style*=fixed]').remove()"
          style="padding:0.6rem 1.5rem; border-radius:8px; background:var(--bg-elevated); color:var(--text-primary);
                 border:1px solid var(--border); cursor:pointer; font-size:0.95rem;">
          Cancel
        </button>
        <button id="confirmDeleteBtn"
          style="padding:0.6rem 1.5rem; border-radius:8px; background:var(--red); color:white;
                 border:none; cursor:pointer; font-size:0.95rem; font-weight:600;">
          Delete Forever
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  // Close on overlay click (outside modal)
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  // Handle delete
  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmDeleteBtn');
    btn.textContent = 'Deleting...';
    btn.disabled = true;
    try {
      const resp = await fetch('/api/cloud/' + projectId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + state.token },
      });
      overlay.remove();
      if (resp.ok) {
        navigate('projects');
      } else {
        const err = await resp.json().catch(() => ({}));
        showToast('Delete failed: ' + (err.error || resp.status));
      }
    } catch(e) {
      overlay.remove();
      showToast('Delete failed: ' + e.message);
    }
  });
}

function publishCloudProject(projectId, title, isRepublish) {
  if (!state.token || state.token === 'demo_token') { openAuthModal(); return; }
  showModal({
    icon: isRepublish ? '&#128260;' : '&#127911;',
    title: isRepublish ? 'Republish Track' : 'Publish as Track',
    message: '<strong>"' + esc(title) + '"</strong><br><br>' +
      (isRepublish
        ? 'The existing published track will be updated with the latest mixdown.'
        : 'The mixdown will appear as a public track in Explore for everyone to hear.'),
    confirmText: isRepublish ? 'Republish' : 'Publish',
    onConfirm: async () => {
      const resp = await fetch('/api/cloud/' + projectId + '/publish', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + state.token },
      });
      if (resp.ok) {
        const json = await resp.json();
        showToast(json.action === 'updated' ? 'Track republished!' : 'Published successfully!');
        renderPage();
      } else {
        const err = await resp.json().catch(() => ({}));
        showToast('Publish failed: ' + (err.error || resp.status), true);
      }
    },
  });
}

let selectedFile = null;

function handleFileDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio/')) {
    selectedFile = file;
    document.getElementById('uploadFileName').textContent = file.name;
  }
}

function handleFileSelect(input) {
  const file = input.files[0];
  if (file) {
    selectedFile = file;
    document.getElementById('uploadFileName').textContent = file.name;
  }
}

async function handleUpload() {
  if (!state.user) { openAuthModal(); return; }
  const title = document.getElementById('uploadTitle').value;
  if (!title) { showToast('Please enter a title', true); return; }
  if (!selectedFile) { showToast('Please select an audio file', true); return; }

  const btn = document.getElementById('uploadBtn');
  const progress = document.getElementById('uploadProgress');
  const fill = document.getElementById('uploadProgressFill');

  btn.textContent = 'Uploading...';
  btn.disabled = true;
  progress.classList.add('active');

  // Simulate upload progress
  let pct = 0;
  const interval = setInterval(() => {
    pct += Math.random() * 15 + 5;
    if (pct > 95) pct = 95;
    fill.style.width = pct + '%';
  }, 200);

  // Try actual upload
  let uploadError = null;
  let uploadResult = null;
  if (selectedFile) {
    const fd = new FormData();
    fd.append('audio', selectedFile);
    fd.append('title', title);
    fd.append('description', document.getElementById('uploadDesc').value);
    fd.append('genre', document.getElementById('uploadGenre').value);
    fd.append('bpm', document.getElementById('uploadBpm').value || '0');
    fd.append('key', document.getElementById('uploadKey').value);
    try {
      uploadResult = await apiUploadTrack(fd);
      console.log('[ThroughWaves] Upload result:', uploadResult);
    } catch (e) {
      console.error('[ThroughWaves] Upload error:', e.message);
      uploadError = e.message;
    }
  }

  // Finish
  clearInterval(interval);

  if (uploadError) {
    fill.style.width = '0%';
    progress.classList.remove('active');
    btn.textContent = 'Upload';
    btn.disabled = false;
    showToast('Upload failed: ' + uploadError, true);
    return;
  }

  fill.style.width = '100%';
  btn.textContent = 'Uploaded!';

  // Add to demo data
  const newTrack = {
    id: Date.now(),
    title,
    artist: state.user ? state.user.username : 'You',
    genre: document.getElementById('uploadGenre').value,
    bpm: parseInt(document.getElementById('uploadBpm').value) || null,
    key: document.getElementById('uploadKey').value || null,
    duration: Math.floor(Math.random() * 180 + 120),
    likes: 0,
    liked: false,
  };
  if (uploadResult && uploadResult.audio_url) {
    newTrack.audioUrl = uploadResult.audio_url;
    newTrack.id = uploadResult.id || newTrack.id;
  }
  demoTracks.unshift(newTrack);

  // Add to project if selected
  const projId = parseInt(document.getElementById('uploadProject').value);
  if (projId) {
    const proj = demoProjects.find(p => p.id === projId);
    if (proj) {
      proj.tracks.push({
        id: Date.now(), name: title,
        contributor: newTrack.artist, status: 'proposed', votes: 0
      });
    }
  }

  setTimeout(() => {
    btn.textContent = 'Upload';
    btn.disabled = false;
    progress.classList.remove('active');
    fill.style.width = '0%';
    selectedFile = null;
    navigate('home');
  }, 1200);
}

      <div class="track-cover" style="width:120px;height:120px;border-radius:var(--radius-lg);font-size:3rem;">
        <span class="track-cover-art">${icon}</span>
      </div>
      <div style="flex:1;">
        <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.25rem;">${esc(track.title)}</h1>
        <div style="color:var(--text-secondary);font-size:0.95rem;cursor:pointer;" onclick="navigate('user/${user.id}')">${esc(user.username)}</div>
        <div class="track-meta" style="margin-top:0.5rem;">
          <span>${track.genre || ''}</span>
          
          ${track.key ? `<span>${esc(track.key)}</span>` : ''}
          <span>${formatTime(duration)}</span>
          <span>&#9654; ${track.plays || 0}</span>
          <span>&#9829; ${track.likes || 0}</span>
        </div>
        ${track.description ? `<p style="color:var(--text-secondary);font-size:0.9rem;margin-top:0.75rem;">${esc(track.description)}</p>` : ''}
        <div style="display:flex;gap:0.5rem;margin-top:0.75rem;">
          <button class="btn btn-primary btn-sm" onclick="onPlayClick('${track.id}')">&#9654; Play</button>
          <button class="btn btn-secondary btn-sm like-btn" data-track-id="${track.id}" onclick="toggleLike('${track.id}')">
            <span class="like-heart">&#9825;</span> <span class="like-count">${track.likes || 0}</span>
          </button>
          <button class="btn btn-secondary btn-sm repost-btn" data-track-id="${track.id}" onclick="toggleRepost('${track.id}')">
            &#8635; <span class="repost-count">0</span>
          </button>
          <button class="btn btn-secondary btn-sm" onclick="openStemSeparation('${track.id}', '${esc(track.audio_url)}')">

          </button>
          ${(state.user && (state.user.id === track.user_id || state.isAdmin)) ? `
          <button class="btn btn-danger btn-sm" onclick="deleteTrackFromDetail('${track.id}', '${esc(track.title).replace(/'/g, "\\'")}')">

      <div class="waveform-comment-markers">${markers}</div>

// Comment timestamp state for track detail
let detailCommentTime = 0;

function handleDetailWaveformClick(e, trackId, duration) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  detailCommentTime = pct * duration;
  const ts = document.getElementById('commentTimestamp');
  if (ts) ts.textContent = formatTime(detailCommentTime);

  // Also seek if playing
  handleWaveformClick(e, trackId);
}

function seekTrackTo(trackId, seconds) {
  const track = findTrackById(trackId);
  if (!track) return;
  if (!state.currentTrack || state.currentTrack.id !== trackId) {
    const playable = {
      ...track,
      audioUrl: track.audioUrl || track.audio_url || null,
      duration: track.duration || track.duration_seconds || 200,
      artist: track.artist || track._username || 'Unknown',
    };
    playTrack(playable);
  }
  const dur = track.duration || track.duration_seconds || 200;
  simTime = seconds;
  const pct = seconds / dur;
  document.getElementById('bpProgressBar').style.width = (pct * 100) + '%';
  document.getElementById('bpTimeCur').textContent = formatTime(seconds);
  if (track.audioUrl || track.audio_url) {
    audioEl.currentTime = seconds;
  }
}

async function postTrackComment(trackId) {
  if (!state.user) { openAuthModal(); return; }
  const input = document.getElementById('commentText');
  const text = input.value.trim();
  if (!text) return;

  await apiPostComment(trackId, text, detailCommentTime > 0 ? detailCommentTime : null);
  input.value = '';
  detailCommentTime = 0;
  // Re-render the track detail page
  renderTrackDetail(document.getElementById('mainContent'), trackId);
}

// ── AI Stem Separation ──────────────────────────────────────
const STEM_SERVICE = 'http://localhost:8000';
const STEM_COLORS = { vocals: '#EB82B4', drums: '#EBB43C', bass: '#64B4FF', other: '#8CDC8C' };

async function checkStemService() {
  try {
    const r = await fetch(STEM_SERVICE + '/health', { signal: AbortSignal.timeout(3000) });
    return r.ok;
  } catch { return false; }
}

async function openStemSeparation(trackId, audioUrl) {
  const available = await checkStemService();
  if (!available) {
    showToast('Stem separation service not available.\n\nStart it with:\n  cd tools/stem_separator && python server.py');
    return;
  }

  // Create modal overlay
  const overlay = document.createElement('div');
  overlay.id = 'stemModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;max-width:480px;width:90%;box-shadow:var(--shadow-lg);">
      <h3 style="margin-bottom:1rem;font-size:1.2rem;">AI Stem Separation</h3>
      <div id="stemContent">
        <p style="color:var(--text-secondary);margin-bottom:1rem;">Separate this track into individual stems using AI (vocals, drums, bass, other).</p>
        <button class="btn btn-primary" onclick="startStemSeparation('${audioUrl}')">Start Separation</button>
        <button class="btn btn-secondary" onclick="closeStemModal()" style="margin-left:0.5rem;">Cancel</button>
      </div>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeStemModal(); });
  document.body.appendChild(overlay);
}

function closeStemModal() {
  const m = document.getElementById('stemModal');
  if (m) m.remove();
}

async function startStemSeparation(audioUrl) {
  const content = document.getElementById('stemContent');
  content.innerHTML = '<p style="color:var(--text-secondary);">Submitting to AI service...</p>';

  try {
    const resp = await fetch(STEM_SERVICE + '/separate/url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: audioUrl }),
    });
    const data = await resp.json();
    if (!data.job_id) { content.innerHTML = '<p style="color:var(--red);">Failed to start separation.</p>'; return; }
    pollStemJob(data.job_id);
  } catch (e) {
    content.innerHTML = `<p style="color:var(--red);">Error: ${e.message}</p>`;
  }
}

async function pollStemJob(jobId) {
  const content = document.getElementById('stemContent');

  const poll = async () => {
    try {
      const resp = await fetch(STEM_SERVICE + '/status/' + jobId);
      const data = await resp.json();

      if (data.status === 'complete') {
        showStemResults(jobId, data.stems || []);
        return;
      } else if (data.status === 'failed') {
        content.innerHTML = `<p style="color:var(--red);">Separation failed: ${data.error || 'Unknown error'}</p>
          <button class="btn btn-secondary" onclick="closeStemModal()">Close</button>`;
        return;
      }

      const pct = Math.round((data.progress || 0) * 100);
      content.innerHTML = `
        <p style="color:var(--text-secondary);margin-bottom:0.5rem;">${data.message || 'Processing...'}</p>
        <div style="background:var(--bg-base);border-radius:6px;height:8px;overflow:hidden;margin-bottom:0.5rem;">
          <div style="background:var(--accent);height:100%;width:${pct}%;transition:width 0.3s;border-radius:6px;"></div>
        </div>
        <p style="color:var(--text-muted);font-size:0.85rem;">${pct}% complete</p>
      `;
      setTimeout(poll, 2000);
    } catch {
      content.innerHTML = '<p style="color:var(--red);">Lost connection to stem service.</p>';
    }
  };

  poll();
}

function showStemResults(jobId, stems) {
  const content = document.getElementById('stemContent');
  const stemCards = stems.map(s => {
    const color = STEM_COLORS[s] || '#aaa';
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0.8rem;background:var(--bg-base);border-radius:var(--radius);border:1px solid ${color}33;margin-bottom:0.4rem;">
        <span style="color:${color};font-weight:600;">${s.charAt(0).toUpperCase() + s.slice(1)}</span>
        <a href="${STEM_SERVICE}/stems/${jobId}/${s}" download="${s}.wav" class="btn btn-secondary btn-sm" style="font-size:0.8rem;">Download WAV</a>
      </div>
    `;
  }).join('');

  content.innerHTML = `
    <p style="color:var(--green);font-weight:600;margin-bottom:0.75rem;">Separation Complete</p>
    ${stemCards}
    <div style="margin-top:1rem;">
      <button class="btn btn-secondary" onclick="closeStemModal()">Close</button>
    </div>
  `;
}

function toggleTheme() {
  document.body.classList.toggle('light-theme');
  const isLight = document.body.classList.contains('light-theme');
  document.getElementById('themeBtn').textContent = isLight ? '\u2600\uFE0F' : '\uD83C\uDF19';

      <div style="display:flex; gap:0.8rem; justify-content:center;">
        <button onclick="this.closest('div[style*=fixed]').remove()"
          style="padding:0.6rem 1.5rem; border-radius:8px; background:var(--bg-elevated); color:var(--text-primary);
                 border:1px solid var(--border); cursor:pointer; font-size:0.95rem;">
          Cancel
        </button>
        <button id="confirmDeleteTrackBtn"
          style="padding:0.6rem 1.5rem; border-radius:8px; background:var(--red); color:white;
                 border:none; cursor:pointer; font-size:0.95rem; font-weight:600;">
          Delete Forever
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('confirmDeleteTrackBtn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmDeleteTrackBtn');
    btn.textContent = 'Deleting...';
    btn.disabled = true;
    try {
      const resp = await fetch('/api/tracks/' + trackId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + state.token },
      });
      overlay.remove();
      if (resp.ok) {
        navigate('explore');
      } else {
        const err = await resp.json().catch(() => ({}));
        showToast('Delete failed: ' + (err.error || resp.status));
      }
    } catch(e) {
      overlay.remove();
      showToast('Delete failed: ' + e.message);
    }
  });
}

// ── Admin Panel ──
async function renderAdmin(el) {
  if (!state.isAdmin) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128274;</div><div class="empty-state-text">Admin access required</div></div>';
    return;
  }

  el.innerHTML = '<div class="empty-state"><div class="empty-state-text">Loading admin panel...</div></div>';

  const headers = { 'Authorization': 'Bearer ' + state.token };
  let stats, users, tracks, cloud;
  try {
    [stats, users, tracks, cloud] = await Promise.all([
      fetch('/api/admin/stats', { headers }).then(r => r.json()),
      fetch('/api/admin/users', { headers }).then(r => r.json()),
      fetch('/api/admin/tracks', { headers }).then(r => r.json()),
      fetch('/api/admin/cloud', { headers }).then(r => r.json()),
    ]);
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-text">Failed to load admin data: ${e.message}</div></div>`;
    return;
  }

  el.innerHTML = `
    <h1 class="page-title">Admin Panel</h1>

    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:1rem; margin-bottom:2rem;">
      <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; text-align:center;">
        <div style="font-size:2rem; font-weight:700; color:var(--accent);">${stats.user_count || 0}</div>
        <div style="color:var(--text-secondary); font-size:0.9rem;">Users</div>
      </div>
      <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; text-align:center;">
        <div style="font-size:2rem; font-weight:700; color:var(--accent);">${stats.track_count || 0}</div>
        <div style="color:var(--text-secondary); font-size:0.9rem;">Tracks</div>
      </div>
      <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; text-align:center;">
        <div style="font-size:2rem; font-weight:700; color:var(--accent);">${stats.cloud_project_count || 0}</div>
        <div style="color:var(--text-secondary); font-size:0.9rem;">Cloud Projects</div>
      </div>
    </div>

    <h2 style="font-size:1.2rem; font-weight:600; margin-bottom:0.75rem;">Users (${(users || []).length})</h2>
    <div style="overflow-x:auto; margin-bottom:2rem;">
      <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
        <thead>
          <tr style="border-bottom:2px solid var(--border);">
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Username</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Email</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Admin</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Joined</th>
            <th style="text-align:right; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${(users || []).map(u => `
            <tr style="border-bottom:1px solid var(--border);">
              <td style="padding:0.6rem 0.8rem;"><a href="#/user/${u.id}" style="color:var(--accent);">${esc(u.username)}</a></td>
              <td style="padding:0.6rem 0.8rem; color:var(--text-secondary);">${esc(u.email)}</td>
              <td style="padding:0.6rem 0.8rem;">${u.is_admin ? '<span style="color:var(--accent);font-weight:600;">Yes</span>' : 'No'}</td>
              <td style="padding:0.6rem 0.8rem; color:var(--text-muted);">${new Date(u.created_at).toLocaleDateString()}</td>
              <td style="padding:0.6rem 0.8rem; text-align:right;">
                ${u.id !== state.user.id ? `<button class="btn btn-danger btn-sm" onclick="adminDeleteUser('${u.id}', '${esc(u.username).replace(/'/g, "\\'")}')">Delete</button>` : '<span style="color:var(--text-muted); font-size:0.8rem;">You</span>'}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <h2 style="font-size:1.2rem; font-weight:600; margin-bottom:0.75rem;">Tracks (${(tracks || []).length})</h2>
    <div style="overflow-x:auto; margin-bottom:2rem;">
      <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
        <thead>
          <tr style="border-bottom:2px solid var(--border);">
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Title</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Genre</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Plays</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Likes</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Created</th>
            <th style="text-align:right; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${(tracks || []).map(t => `
            <tr style="border-bottom:1px solid var(--border);">
              <td style="padding:0.6rem 0.8rem;"><a href="#/track/${t.id}" style="color:var(--accent);">${esc(t.title)}</a></td>
              <td style="padding:0.6rem 0.8rem; color:var(--text-secondary);">${esc(t.genre) || '-'}</td>
              <td style="padding:0.6rem 0.8rem;">${t.plays || 0}</td>
              <td style="padding:0.6rem 0.8rem;">${t.likes || 0}</td>
              <td style="padding:0.6rem 0.8rem; color:var(--text-muted);">${new Date(t.created_at).toLocaleDateString()}</td>
              <td style="padding:0.6rem 0.8rem; text-align:right;">
                <button class="btn btn-danger btn-sm" onclick="adminDeleteTrack('${t.id}', '${esc(t.title).replace(/'/g, "\\'")}')">Delete</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <h2 style="font-size:1.2rem; font-weight:600; margin-bottom:0.75rem;">Cloud Projects (${(cloud || []).length})</h2>
    <div style="overflow-x:auto; margin-bottom:2rem;">
      <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
        <thead>
          <tr style="border-bottom:2px solid var(--border);">
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Title</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Genre</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Public</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Plays</th>
            <th style="text-align:left; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Created</th>
            <th style="text-align:right; padding:0.6rem 0.8rem; color:var(--text-secondary); font-weight:500;">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${(cloud || []).map(c => `
            <tr style="border-bottom:1px solid var(--border);">
              <td style="padding:0.6rem 0.8rem;"><a href="#/cloud/${c.id}" style="color:var(--accent);">${esc(c.title)}</a></td>
              <td style="padding:0.6rem 0.8rem; color:var(--text-secondary);">${esc(c.genre) || '-'}</td>
              <td style="padding:0.6rem 0.8rem;">${c.is_public ? 'Yes' : 'No'}</td>
              <td style="padding:0.6rem 0.8rem;">${c.plays || 0}</td>
              <td style="padding:0.6rem 0.8rem; color:var(--text-muted);">${new Date(c.created_at).toLocaleDateString()}</td>
              <td style="padding:0.6rem 0.8rem; text-align:right;">
                <button class="btn btn-danger btn-sm" onclick="adminDeleteCloud('${c.id}', '${esc(c.title).replace(/'/g, "\\'")}')">Delete</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function adminDeleteConfirm(entityType, entityId, entityName, apiPath) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
  overlay.innerHTML = `
    <div style="
      background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:2rem; max-width:420px; width:90%; box-shadow:var(--shadow-lg);
      text-align:center;
    ">
      <div style="font-size:2.5rem; margin-bottom:0.8rem;">&#9888;</div>
      <h3 style="margin-bottom:0.5rem; color:var(--text-primary);">Delete ${entityType}?</h3>
      <p style="color:var(--text-secondary); margin-bottom:0.3rem; font-size:0.95rem;">
        <strong>"${entityName}"</strong>
      </p>
      <p style="color:var(--text-muted); margin-bottom:1.5rem; font-size:0.85rem;">
        This will be permanently deleted.<br>This cannot be undone.
      </p>
      <div style="display:flex; gap:0.8rem; justify-content:center;">
        <button onclick="this.closest('div[style*=fixed]').remove()"
          style="padding:0.6rem 1.5rem; border-radius:8px; background:var(--bg-elevated); color:var(--text-primary);
                 border:1px solid var(--border); cursor:pointer; font-size:0.95rem;">
          Cancel
        </button>
        <button id="confirmAdminDeleteBtn"
          style="padding:0.6rem 1.5rem; border-radius:8px; background:var(--red); color:white;
                 border:none; cursor:pointer; font-size:0.95rem; font-weight:600;">
          Delete Forever
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('confirmAdminDeleteBtn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmAdminDeleteBtn');
    btn.textContent = 'Deleting...';
    btn.disabled = true;
    try {
      const resp = await fetch(apiPath + entityId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + state.token },
      });
      overlay.remove();
      if (resp.ok) {
        renderAdmin(document.getElementById('mainContent'));
      } else {
        const err = await resp.json().catch(() => ({}));
        showToast('Delete failed: ' + (err.error || resp.status));
      }
    } catch(e) {
      overlay.remove();
      showToast('Delete failed: ' + e.message);
    }
  });
}

function adminDeleteUser(id, name) { adminDeleteConfirm('User', id, name, '/api/admin/users/'); }
function adminDeleteTrack(id, name) { adminDeleteConfirm('Track', id, name, '/api/admin/tracks/'); }
function adminDeleteCloud(id, name) { adminDeleteConfirm('Cloud Project', id, name, '/api/admin/cloud/'); }

init();
</script>
</body>
</html>
